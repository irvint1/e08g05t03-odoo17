trigger:
  branches:
    include:
      - Staging
      - master

pr: none

variables:
  vmImageName: 'ubuntu-latest'
  bundleName: 'odoo18-vm-bundle'
  artifactName: 'vm-bundle'
  containerImage: 'odoo-erp:18.0-bundle'
  stagingSshEndpoint: 'ssh-odoo17-staging'
  productionSshEndpoint: 'ssh-odoo17-staging'
  stagingVmDeployPath: '/opt/odoo18/staging'
  productionVmDeployPath: '/opt/odoo18/production'

stages:
- stage: Build
  displayName: Build VM Bundle
  jobs:
  - job: BuildBundle
    displayName: Build Docker image and publish deployable bundle
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
      clean: true

    - bash: |
        set -euo pipefail
        chmod +x scripts/build-vm-bundle.sh
        scripts/build-vm-bundle.sh "$(containerImage)" "$(bundleName)"
      displayName: Build Odoo 18 bundle

    - task: PublishPipelineArtifact@1
      displayName: Publish bundle folder artifact
      inputs:
        targetPath: '$(Build.SourcesDirectory)/dist/$(bundleName)'
        artifact: '$(artifactName)'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: Publish bundle archive artifact
      inputs:
        targetPath: '$(Build.SourcesDirectory)/dist/$(bundleName).tar.gz'
        artifact: '$(artifactName)-archive'
        publishLocation: 'pipeline'

- stage: DeployStaging
  displayName: Deploy to Staging
  dependsOn: Build
  condition: eq(variables['Build.SourceBranchName'], 'Staging')
  jobs:
  - deployment: DeployStaging
    displayName: Deploy bundle to staging VM
    environment: Staging
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)

          - task: SSH@0
            displayName: Prepare staging deploy folder
            inputs:
              sshEndpoint: '$(stagingSshEndpoint)'
              runOptions: commands
              commands: |
                set -euo pipefail
                mkdir -p "$(stagingVmDeployPath)"
                find "$(stagingVmDeployPath)" -mindepth 1 -maxdepth 1 ! -name '.env.vm' -exec rm -rf {} +

          - task: CopyFilesOverSSH@0
            displayName: Copy bundle to staging VM
            inputs:
              sshEndpoint: '$(stagingSshEndpoint)'
              sourceFolder: '$(Pipeline.Workspace)/$(artifactName)'
              contents: '**'
              targetFolder: '$(stagingVmDeployPath)'
              cleanTargetFolder: false
              overwrite: true
              readyTimeout: '20000'

          - task: SSH@0
            displayName: Start staging stack
            inputs:
              sshEndpoint: '$(stagingSshEndpoint)'
              runOptions: commands
              commands: |
                set -euo pipefail
                cd "$(stagingVmDeployPath)"
                if [ ! -f .env.vm ]; then
                  cp .env.vm.example .env.vm
                fi
                chmod +x scripts/start-odoo-vm.sh
                ./scripts/start-odoo-vm.sh
                docker compose --env-file .env.vm -f docker-compose.vm.yml ps

- stage: DeployProduction
  displayName: Deploy to Production
  dependsOn: Build
  condition: eq(variables['Build.SourceBranchName'], 'master')
  jobs:
  - deployment: DeployProduction
    displayName: Deploy bundle to production VM
    environment: Production
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)

          - task: SSH@0
            displayName: Prepare production deploy folder
            inputs:
              sshEndpoint: '$(productionSshEndpoint)'
              runOptions: commands
              commands: |
                set -euo pipefail
                mkdir -p "$(productionVmDeployPath)"
                find "$(productionVmDeployPath)" -mindepth 1 -maxdepth 1 ! -name '.env.vm' -exec rm -rf {} +

          - task: CopyFilesOverSSH@0
            displayName: Copy bundle to production VM
            inputs:
              sshEndpoint: '$(productionSshEndpoint)'
              sourceFolder: '$(Pipeline.Workspace)/$(artifactName)'
              contents: '**'
              targetFolder: '$(productionVmDeployPath)'
              cleanTargetFolder: false
              overwrite: true
              readyTimeout: '20000'

          - task: SSH@0
            displayName: Start production stack
            inputs:
              sshEndpoint: '$(productionSshEndpoint)'
              runOptions: commands
              commands: |
                set -euo pipefail
                cd "$(productionVmDeployPath)"
                if [ ! -f .env.vm ]; then
                  cp .env.vm.example .env.vm
                fi
                chmod +x scripts/start-odoo-vm.sh
                ./scripts/start-odoo-vm.sh
                docker compose --env-file .env.vm -f docker-compose.vm.yml ps
