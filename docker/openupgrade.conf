[options]
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; OpenUpgrade itself lives in /opt/openupgrade and the migrated OCA addons
; from this repo are mounted at /mnt/extra-addons during the migration run.
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/var/lib/odoo/addons/18.0,/opt/openupgrade,/mnt/extra-addons

data_dir = /var/lib/odoo
admin_passwd = admin

workers = 0
max_cron_threads = 1
proxy_mode = False
