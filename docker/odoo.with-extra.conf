[options]
; Database settings are injected by docker-compose service names.
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; Enable this only after the third-party addons have been migrated to Odoo 18.
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/var/lib/odoo/addons/18.0,/mnt/extra-addons

data_dir = /var/lib/odoo
admin_passwd = admin

; Conservative defaults for a small VM.
workers = 0
max_cron_threads = 1
proxy_mode = False

; Uncomment to force one DB name in production.
; db_name = odoo
